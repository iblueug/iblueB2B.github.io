<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>iBlue B2B • My Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #1F2937;
            padding-bottom: 80px;
        }

        /* Header */
        .header {
            background: #0B4F6C;
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            flex: 1;
        }

        .add-btn {
            background: white;
            color: #0B4F6C;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Stats Bar */
        .stats-bar {
            background: white;
            padding: 16px;
            border-bottom: 1px solid #E5E7EB;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #0B4F6C;
        }

        .stat-label {
            font-size: 11px;
            color: #6B7280;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #E5E7EB;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 16px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #6B7280;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #0B4F6C;
            border-bottom-color: #0B4F6C;
        }

        .tab i {
            margin-right: 8px;
        }

        /* Search Bar */
        .search-container {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #E5E7EB;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px;
            padding-left: 44px;
            border-radius: 30px;
            border: 1.5px solid #E5E7EB;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #0B4F6C;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 16px;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #E5E7EB;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            background: #F3F4F6;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #4B5563;
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-chip.active {
            background: #0B4F6C;
            color: white;
        }

        .filter-chip i {
            font-size: 12px;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 16px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #E5E7EB;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .product-image {
            height: 180px;
            background: #F3F4F6;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-active {
            background: #10B981;
            color: white;
        }

        .badge-draft {
            background: #9CA3AF;
            color: white;
        }

        .badge-sold {
            background: #F59E0B;
            color: white;
        }

        .badge-expired {
            background: #EF4444;
            color: white;
        }

        .product-info {
            padding: 16px;
        }

        .product-title {
            font-size: 16px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-category {
            font-size: 12px;
            color: #6B7280;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .product-pricing {
            background: #F9FAFB;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .price-label {
            color: #6B7280;
        }

        .price-value {
            font-weight: 600;
            color: #0B4F6C;
        }

        .price-value.wholesale {
            color: #10B981;
        }

        .product-stock {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0;
            font-size: 13px;
        }

        .stock-bar {
            flex: 1;
            height: 6px;
            background: #E5E7EB;
            border-radius: 3px;
            overflow: hidden;
        }

        .stock-fill {
            height: 100%;
            background: #10B981;
            border-radius: 3px;
        }

        .stock-fill.low {
            background: #EF4444;
        }

        .stock-text {
            font-weight: 600;
        }

        .stock-text.low {
            color: #EF4444;
        }

        .product-meta {
            display: flex;
            gap: 16px;
            margin: 12px 0;
            font-size: 12px;
            color: #6B7280;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            border-top: 1px solid #F3F4F6;
            padding-top: 16px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .btn-edit {
            background: #F3F4F6;
            color: #4B5563;
        }

        .btn-view {
            background: #0B4F6C;
            color: white;
        }

        .btn-duplicate {
            background: white;
            border: 1.5px solid #E5E7EB;
            color: #4B5563;
        }

        .btn-delete {
            background: #FEE2E2;
            color: #EF4444;
        }

        /* Bulk Pricing Tiers */
        .tiers-preview {
            display: flex;
            gap: 4px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .tier-tag {
            background: #E0F2FE;
            color: #0369A1;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
            margin: 16px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: #F3F4F6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: #9CA3AF;
            font-size: 32px;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 8px;
        }

        .empty-text {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .empty-btn {
            background: #0B4F6C;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        /* Loading Skeleton */
        .skeleton-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }

        .skeleton-image {
            height: 180px;
            background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        .skeleton-line {
            height: 16px;
            background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
            margin: 8px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Delete Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: #FEE2E2;
            color: #EF4444;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .modal-text {
            text-align: center;
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .modal-btn-danger {
            background: #EF4444;
            color: white;
        }

        .modal-btn-secondary {
            background: #F3F4F6;
            color: #4B5563;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            text-align: center;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            max-width: 400px;
            margin: 0 auto;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #E5E7EB;
            display: flex;
            padding: 8px 0 12px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #9CA3AF;
            font-size: 11px;
            gap: 4px;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: #0B4F6C;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="menu-btn" id="menuBtn">
            <i class="fas fa-bars"></i>
        </div>
        <div class="header-title">My Products</div>
        <a href="post-ad.html?type=b2b" class="add-btn">
            <i class="fas fa-plus"></i>
            Add Product
        </a>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="statActive">0</div>
            <div class="stat-label">Active</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statDraft">0</div>
            <div class="stat-label">Drafts</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statSold">0</div>
            <div class="stat-label">Sold Out</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statViews">0</div>
            <div class="stat-label">Total Views</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-status="all">
            <i class="fas fa-box"></i>
            All Products
        </div>
        <div class="tab" data-status="active">
            <i class="fas fa-check-circle"></i>
            Active
        </div>
        <div class="tab" data-status="draft">
            <i class="fas fa-pen"></i>
            Drafts
        </div>
        <div class="tab" data-status="sold">

            Sold Out

        <div class="tab" data-status="expired">
            <i class="fas fa-clock"></i>

    <!-- Search Bar -->
    <div class="search-container">

        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-chip active" data-filter="all">
            <i class="fas fa-layer-group"></i>
            All Categories
        </div>
        <!-- Categories populated by JS -->
    </div>

    <!-- Products Grid -->
    <div class="products-grid" id="productsGrid">
        <!-- Loading Skeletons -->
        <div class="skeleton-card">
            <div class="skeleton-image"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%;"></div>
            <div class="skeleton-line" style="width: 40%;"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-image"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%;"></div>
            <div class="skeleton-line" style="width: 40%;"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-image"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%;"></div>
            <div class="skeleton-line" style="width: 40%;"></div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="modal-title">Delete Product</h3>
            <p class="modal-text" id="deleteProductName">Are you sure you want to delete this product?</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button class="modal-btn modal-btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="supplier-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <a href="supplier-products.html" class="nav-item active">
            <i class="fas fa-box"></i>
            <span>Products</span>
        </a>
        <a href="supplier-orders.html" class="nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Orders</span>
        </a>
        <a href="supplier-negotiations.html" class="nav-item">
            <i class="fas fa-handshake"></i>
            <span>Deals</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="far fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://uufhvmmgwzkxvvdbqemz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1Zmh2bW1nd3preHZ2ZGJxZW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMDIzNTYsImV4cCI6MjA4NTg3ODM1Nn0.WABHx4ilFRkhPHP-y4ZC4E8Kb7PRqY-cyxI8cVS8Tyc';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================
        // STATE
        // ============================================
        let currentUser = null;
        let products = [];
        let filteredProducts = [];
        let categories = [];
        let currentStatus = 'all';
        let currentCategory = 'all';
        let productToDelete = null;

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadCategories();
            await loadProducts();
            setupEventListeners();
        });

        // ============================================
        // CHECK AUTH
        // ============================================
        async function checkAuth() {
            try {
                const { data: { user }, error } = await sb.auth.getUser();
                
                if (error || !user) {
                    showToast('Please login to view your products');
                    setTimeout(() => {
                        window.location.href = 'login.html?redirect=supplier-products.html';
                    }, 2000);
                    return;
                }
                
                currentUser = user;
                
                // Check if user is supplier
                const { data: profile } = await sb
                    .from('profiles')
                    .select('is_supplier')
                    .eq('id', user.id)
                    .single();
                
                if (!profile?.is_supplier) {
                    showToast('Access denied. Supplier account required.');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                }
                
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }

        // ============================================
        // LOAD CATEGORIES
        // ============================================
        async function loadCategories() {
            try {
                const { data, error } = await sb
                    .from('categories')
                    .select('id, name')
                    .eq('is_active', true)
                    .order('name');

                if (error) throw error;

                categories = data || [];

                // Render category filters
                const filterBar = document.querySelector('.filter-bar');
                categories.forEach(cat => {
                    const chip = document.createElement('div');
                    chip.className = 'filter-chip';
                    chip.dataset.category = cat.id;
                    chip.innerHTML = `<i class="fas fa-tag"></i> ${cat.name}`;
                    chip.addEventListener('click', () => filterByCategory(cat.id));
                    filterBar.appendChild(chip);
                });

            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        // ============================================
        // LOAD PRODUCTS
        // ============================================
        async function loadProducts() {
            try {
                const { data, error } = await sb
                    .from('ads')
                    .select(`
                        *,
                        category:categories!ads_category_id_fkey (
                            id,
                            name
                        ),
                        bulk_pricing:bulk_pricing (*)
                    `)
                    .eq('seller_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                products = data || [];
                filteredProducts = [...products];
                
                updateStats();
                renderProducts();
                
            } catch (error) {
                console.error('Error loading products:', error);
                showToast('Error loading products');
            }
        }

        // ============================================
        // UPDATE STATS
        // ============================================
        function updateStats() {
            const stats = {
                active: products.filter(p => p.status === 'active').length,
                draft: products.filter(p => p.status === 'draft').length,
                sold: products.filter(p => p.status === 'sold').length,
                expired: products.filter(p => p.status === 'expired').length,
                views: products.reduce((sum, p) => sum + (p.view_count || 0), 0)
            };

            document.getElementById('statActive').textContent = stats.active;
            document.getElementById('statDraft').textContent = stats.draft;
            document.getElementById('statSold').textContent = stats.sold;
            document.getElementById('statViews').textContent = stats.views;
        }

        // ============================================
        // RENDER PRODUCTS
        // ============================================
        function renderProducts() {
            const container = document.getElementById('productsGrid');

            if (filteredProducts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">
                            <i class="fas fa-box-open"></i>
                        </div>
                        <h3 class="empty-title">No Products Found</h3>
                        <p class="empty-text">Get started by adding your first product</p>
                        <a href="post-ad.html?type=b2b" class="empty-btn">
                            <i class="fas fa-plus"></i> Add Product
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredProducts.map(product => {
                const imageUrl = product.image_urls?.[0] || 'https://via.placeholder.com/280x180?text=No+Image';
                const wholesalePrice = product.wholesale_price || product.price || 0;
                const retailPrice = product.price || 0;
                const hasDiscount = wholesalePrice < retailPrice;
                
                // Stock status
                const stockLevel = product.stock_quantity || 0;
                const lowStockThreshold = product.low_stock_threshold || 10;
                const stockPercentage = Math.min((stockLevel / 100) * 100, 100);
                const isLowStock = stockLevel <= lowStockThreshold;

                // Status badge
                const statusBadge = getStatusBadge(product.status);

                return `
                    <div class="product-card" data-id="${product.id}">
                        <div class="product-image">
                            <img src="${imageUrl}" alt="${product.title}" loading="lazy">
                            <div class="product-badge ${statusBadge.class}">${statusBadge.text}</div>
                        </div>
                        <div class="product-info">
                            <div class="product-title">
                                ${product.title}
                                ${product.is_bulk_only ? '<i class="fas fa-cubes" style="color: #F59E0B;" title="Bulk Only"></i>' : ''}
                            </div>
                            
                            <div class="product-category">
                                <i class="fas fa-folder"></i>
                                ${product.category?.name || 'Uncategorized'}
                            </div>

                            <div class="product-pricing">
                                <div class="price-row">
                                    <span class="price-label">Wholesale</span>
                                    <span class="price-value wholesale">UGX ${parseInt(wholesalePrice).toLocaleString()}</span>
                                </div>
                                ${hasDiscount ? `
                                    <div class="price-row">
                                        <span class="price-label">Retail</span>
                                        <span class="price-value">UGX ${parseInt(retailPrice).toLocaleString()}</span>
                                    </div>
                                ` : ''}
                                <div class="price-row">
                                    <span class="price-label">MOQ</span>
                                    <span class="price-value">${product.moq || 1} units</span>
                                </div>
                            </div>

                            ${renderBulkTiers(product.bulk_pricing)}

                            <div class="product-stock">
                                <span class="stock-text ${isLowStock ? 'low' : ''}">
                                    <i class="fas fa-${isLowStock ? 'exclamation-circle' : 'check-circle'}"></i>
                                    ${stockLevel} in stock
                                </span>
                                <div class="stock-bar">
                                    <div class="stock-fill ${isLowStock ? 'low' : ''}" style="width: ${stockPercentage}%"></div>
                                </div>
                            </div>

                            <div class="product-meta">
                                <span class="meta-item">
                                    <i class="fas fa-eye"></i>
                                    ${product.view_count || 0} views
                                </span>
                                <span class="meta-item">
                                    <i class="fas fa-clock"></i>
                                    ${formatDate(product.created_at)}
                                </span>
                            </div>

                            <div class="product-actions">
                                <a href="edit-ad.html?id=${product.id}" class="action-btn btn-edit">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <a href="B2B-ad-detail.html?id=${product.id}" class="action-btn btn-view" target="_blank">
                                    <i class="fas fa-eye"></i> View
                                </a>
                                <button class="action-btn btn-delete" onclick="openDeleteModal('${product.id}', '${product.title.replace(/'/g, "\\'")}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusBadge(status) {
            const badges = {
                'active': { class: 'badge-active', text: 'Active' },
                'draft': { class: 'badge-draft', text: 'Draft' },
                'sold': { class: 'badge-sold', text: 'Sold Out' },
                'expired': { class: 'badge-expired', text: 'Expired' },
                'banned': { class: 'badge-expired', text: 'Banned' }
            };
            return badges[status] || { class: 'badge-draft', text: status };
        }

        function renderBulkTiers(tiers) {
            if (!tiers || tiers.length === 0) return '';

            return `
                <div class="tiers-preview">
                    ${tiers.slice(0, 3).map(tier => `
                        <span class="tier-tag">${tier.min_quantity}+: UGX ${parseInt(tier.price_per_unit).toLocaleString()}</span>
                    `).join('')}
                    ${tiers.length > 3 ? '<span class="tier-tag">+more</span>' : ''}
                </div>
            `;
        }

        // ============================================
        // FILTER FUNCTIONS
        // ============================================
        function filterProducts() {
            filteredProducts = products.filter(product => {
                // Filter by status
                if (currentStatus !== 'all' && product.status !== currentStatus) {
                    return false;
                }

                // Filter by category
                if (currentCategory !== 'all' && product.category_id !== parseInt(currentCategory)) {
                    return false;
                }

                // Filter by search
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                if (searchTerm && !product.title.toLowerCase().includes(searchTerm)) {
                    return false;
                }

                return true;
            });

            renderProducts();
        }

        window.filterByCategory = function(categoryId) {
            // Update active state
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            currentCategory = categoryId;
            filterProducts();
        };

        // ============================================
        // SETUP EVENT LISTENERS
        // ============================================
        function setupEventListeners() {
            // Tab switching
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    currentStatus = tab.dataset.status;
                    filterProducts();
                });
            });

            // Search
            let searchTimeout;
            document.getElementById('searchInput').addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(filterProducts, 500);
            });

            // Menu button
            document.getElementById('menuBtn').addEventListener('click', () => {
                window.location.href = 'supplier-dashboard.html';
            });

            // Confirm delete
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
        }

        // ============================================
        // DELETE PRODUCT
        // ============================================
        window.openDeleteModal = function(productId, productTitle) {
            productToDelete = productId;
            document.getElementById('deleteProductName').textContent = `Delete "${productTitle}"?`;
            document.getElementById('deleteModal').classList.add('show');
        };

        window.closeDeleteModal = function() {
            document.getElementById('deleteModal').classList.remove('show');
            productToDelete = null;
        };

        async function confirmDelete() {
            if (!productToDelete) return;

            try {
                const { error } = await sb
                    .from('ads')
                    .delete()
                    .eq('id', productToDelete)
                    .eq('seller_id', currentUser.id);

                if (error) throw error;

                // Remove from local arrays
                products = products.filter(p => p.id !== productToDelete);
                filteredProducts = filteredProducts.filter(p => p.id !== productToDelete);
                
                updateStats();
                renderProducts();
                
                showToast('Product deleted successfully');
                closeDeleteModal();

            } catch (error) {
                console.error('Error deleting product:', error);
                showToast('Error deleting product');
                closeDeleteModal();
            }
        }

        // ============================================
        // UTILITIES
        // ============================================
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days < 7) return `${days} days ago`;
            if (days < 30) return `${Math.floor(days / 7)} weeks ago`;
            
            return date.toLocaleDateString('en-UG', { 
                month: 'short', 
                day: 'numeric',
                year: 'numeric'
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('deleteModal');
            if (event.target === modal) {
                closeDeleteModal();
            }
        };
    </script>
</body>
</html>
